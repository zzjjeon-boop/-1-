<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>삼각함수 최종 시뮬레이터</title>
    <style>
        body { margin: 0; padding: 0; height: 100vh; display: flex; font-family: sans-serif; background: #ffffff; overflow: hidden; touch-action: none; }
        .container { display: flex; width: 100vw; height: 100vh; }
        .panel { flex: 1; position: relative; border-right: 2px solid #f0f0f0; }
        canvas { display: block; width: 100%; height: 100%; }
        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 1000; }
        button { padding: 8px 16px; font-weight: bold; border: 1px solid #ddd; border-radius: 20px; background: white; cursor: pointer; }
        .active { background: #007bff; color: white; border-color: #007bff; }
        .label { position: absolute; top: 12px; left: 15px; font-size: 13px; font-weight: bold; color: #888; pointer-events: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="panel">
            <div class="label">단위원 (Unit Circle)</div>
            <canvas id="circleCanvas"></canvas>
        </div>
        <div class="panel">
            <div class="label" id="graphTitle">Sine Function</div>
            <canvas id="graphCanvas"></canvas>
        </div>

        <div class="controls">
            <button id="btnPlay" onclick="togglePlay()">Play</button>
            <button onclick="resetAll()">Reset</button>
            <button id="btnSin" class="active" onclick="setType('sin')">Sine</button>
            <button id="btnCos" onclick="setType('cos')">Cosine</button>
        </div>
    </div>

    <script>
        var state = { angle: 0, isPlaying: false, currentType: 'sin', traceData: [], isDragging: false, currentPage: 0, targetPageOffset: 0, currentPageOffset: 0 };
        var cCanvas = document.getElementById('circleCanvas');
        var gCanvas = document.getElementById('graphCanvas');
        var cCtx = cCanvas.getContext('2d');
        var gCtx = gCanvas.getContext('2d');

        function resize() {
            cCanvas.width = cCanvas.clientWidth;
            cCanvas.height = cCanvas.clientHeight;
            gCanvas.width = gCanvas.clientWidth;
            gCanvas.height = gCanvas.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function updateAngle(newRawAngle) {
            let diff = newRawAngle - (state.angle % (Math.PI * 2));
            if (diff > Math.PI) diff -= Math.PI * 2;
            if (diff < -Math.PI) diff += Math.PI * 2;
            state.angle += diff;
            state.currentPage = Math.floor(state.angle / (Math.PI * 2));
            saveTrace();
        }

        function saveTrace() {
            var val = state.currentType === 'sin' ? Math.sin(state.angle) : Math.cos(state.angle);
            state.traceData.push({ a: state.angle, v: val });
            if (state.traceData.length > 1000) state.traceData.shift();
        }

        function handleMove(e) {
            if (!state.isDragging || state.isPlaying) return;
            var rect = cCanvas.getBoundingClientRect();
            var x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left - cCanvas.width/2;
            var y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top - cCanvas.height/2;
            updateAngle(Math.atan2(-y, x));
        }

        cCanvas.addEventListener('mousedown', () => { state.isDragging = true; state.isPlaying = false; document.getElementById('btnPlay').innerText = 'Play'; });
        window.addEventListener('mouseup', () => state.isDragging = false);
        cCanvas.addEventListener('mousemove', handleMove);
        cCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); state.isDragging = true; state.isPlaying = false; });
        cCanvas.addEventListener('touchend', () => state.isDragging = false);
        cCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); });

        function drawArrow(ctx, fromX, fromY, toX, toY, label) {
            ctx.strokeStyle = "#222"; ctx.fillStyle = "#222"; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(fromX, fromY); ctx.lineTo(toX, toY); ctx.stroke();
            var headlen = 8; var angle = Math.atan2(toY - fromY, toX - fromX);
            ctx.beginPath(); ctx.moveTo(toX, toY);
            ctx.lineTo(toX-headlen*Math.cos(angle-0.5), toY-headlen*Math.sin(angle-0.5));
            ctx.lineTo(toX-headlen*Math.cos(angle+0.5), toY-headlen*Math.sin(angle+0.5));
            ctx.fill();
            if (label) { ctx.font = "italic bold 16px serif"; ctx.fillText(label, toX - 12, toY - 12); }
        }

        function animate() {
            cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
            gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);

            var unit = Math.min(cCanvas.width, cCanvas.height) * 0.25;
            var cx = cCanvas.width / 2; var cy = cCanvas.height / 2;
            
            // 1. 단위원 패널
            drawArrow(cCtx, 20, cy, cCanvas.width - 20, cy, "x");
            drawArrow(cCtx, cx, cCanvas.height - 20, cx, 20, "y");
            cCtx.strokeStyle = "#ddd"; cCtx.beginPath(); cCtx.arc(cx, cy, unit, 0, Math.PI * 2); cCtx.stroke();

            // 단위원 눈금 추가 (1, -1)
            cCtx.font = "12px Arial"; cCtx.fillStyle = "#666"; cCtx.textAlign = "center";
            cCtx.fillText("1", cx + unit, cy + 20);
            cCtx.fillText("-1", cx - unit, cy + 20);
            cCtx.textAlign = "right";
            cCtx.fillText("1", cx - 8, cy - unit + 5);
            cCtx.fillText("-1", cx - 8, cy + unit + 5);

            if (state.isPlaying) {
                state.angle += 0.015;
                state.currentPage = Math.floor(state.angle / (Math.PI * 2));
                saveTrace();
            }

            var px = cx + Math.cos(state.angle) * unit;
            var py = cy - Math.sin(state.angle) * unit;
            cCtx.setLineDash([2, 2]); cCtx.strokeStyle = "#999";
            cCtx.beginPath(); cCtx.moveTo(cx, cy); cCtx.lineTo(px, py); cCtx.stroke(); cCtx.setLineDash([]);
            cCtx.fillStyle = state.currentType === 'sin' ? "#007bff" : "#e84118";
            cCtx.beginPath(); cCtx.arc(px, py, 10, 0, Math.PI * 2); cCtx.fill();

            // 2. 그래프 패널 (페이지 슬라이딩)
            var gxYAxis = 50; 
            var gy = gCanvas.height / 2;
            var gScaleX = (gCanvas.width - 100) / (Math.PI * 2);

            state.targetPageOffset = -state.currentPage * (Math.PI * 2) * gScaleX;
            state.currentPageOffset += (state.targetPageOffset - state.currentPageOffset) * 0.1;

            gCtx.save();
            gCtx.translate(state.currentPageOffset, 0);

            drawArrow(gCtx, gxYAxis - state.currentPageOffset + 10, gy, gCanvas.width - state.currentPageOffset - 10, gy, "θ");
            drawArrow(gCtx, gxYAxis, gCanvas.height - 20, gxYAxis, 20, "y");

            gCtx.font = "12px Arial"; gCtx.textAlign = "center";
            for (var p = state.currentPage - 1; p <= state.currentPage + 1; p++) {
                var pageStartAngle = p * (Math.PI * 2);
                for (var i = 0; i <= 4; i++) {
                    var angleValue = pageStartAngle + (Math.PI / 2 * i);
                    var tx = gxYAxis + angleValue * gScaleX;
                    gCtx.strokeStyle = "#bbb";
                    gCtx.beginPath(); gCtx.moveTo(tx, gy - 5); gCtx.lineTo(tx, gy + 5); gCtx.stroke();
                    
                    var label = "";
                    if (angleValue === 0) label = "0";
                    else if (angleValue === Math.PI/2) label = "π/2";
                    else if (angleValue === -Math.PI/2) label = "-π/2";
                    else if (angleValue % Math.PI === 0) label = (Math.round(angleValue/Math.PI)) + "π";
                    else {
                        var num = Math.round(angleValue / (Math.PI / 2));
                        if(num % 2 !== 0) label = num + "π/2";
                    }
                    gCtx.fillStyle = "#888"; gCtx.fillText(label, tx, gy + 22);
                }
            }

            gCtx.textAlign = "right";
            gCtx.fillText("1", gxYAxis - 8, gy - unit + 4);
            gCtx.fillText("-1", gxYAxis - 8, gy + unit + 4);

            if (state.traceData.length > 1) {
                gCtx.strokeStyle = state.currentType === 'sin' ? "#007bff" : "#e84118";
                gCtx.lineWidth = 3;
                gCtx.beginPath();
                for (var i = 0; i < state.traceData.length; i++) {
                    var pt = state.traceData[i];
                    var dx = gxYAxis + pt.a * gScaleX;
                    var dy = gy - pt.v * unit;
                    if (i === 0) gCtx.moveTo(dx, dy);
                    else gCtx.lineTo(dx, dy);
                }
                gCtx.stroke();
            }

            var currentVal = state.currentType === 'sin' ? Math.sin(state.angle) : Math.cos(state.angle);
            gCtx.fillStyle = state.currentType === 'sin' ? "#007bff" : "#e84118";
            gCtx.beginPath(); 
            gCtx.arc(gxYAxis + state.angle * gScaleX, gy - currentVal * unit, 6, 0, Math.PI * 2); 
            gCtx.fill();

            gCtx.restore();
            requestAnimationFrame(animate);
        }

        function togglePlay() {
            state.isPlaying = !state.isPlaying;
            document.getElementById('btnPlay').innerText = state.isPlaying ? 'Pause' : 'Play';
        }

        function resetAll() {
            state.angle = 0;
            state.traceData = [];
            state.isPlaying = false;
            state.currentPage = 0;
            state.currentPageOffset = 0;
            document.getElementById('btnPlay').innerText = 'Play';
        }

        function setType(type) {
            state.currentType = type;
            state.traceData = [];
            document.getElementById('btnSin').className = (type === 'sin' ? 'active' : '');
            document.getElementById('btnCos').className = (type === 'cos' ? 'active' : '');
        }

        animate();
    </script>
</body>
</html>
